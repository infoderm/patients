name: ci:build

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  build:
    name: Continuous integration (build)
    strategy:
      matrix:
        platform:
          - ubuntu-latest
        architecture:
          - os.linux.x86_64

    runs-on: ${{ matrix.platform }}

    timeout-minutes: 15

    outputs:
      node-version: ${{ steps.meteor-node.outputs.version }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install 💾
        uses: meteor-actions/install@v3

      - name: Get Meteor's Node version
        id: meteor-node
        run: |
          echo \
          "version=$(meteor node --version | tail -c +2)" \
          >> "$GITHUB_OUTPUT"

      - name: Cache build 💽
        uses: meteor-actions/cache-build@v3
        with:
          key: build

      - name: Build 🏗️
        run: meteor npm run build -- ./dist --architecture ${{ matrix.architecture }}

      - name: Archive build 💽
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1


  test:
    needs:
      - build

    strategy:
      matrix:
        platform:
          - ubuntu-latest

    runs-on: ${{ matrix.platform }}

    timeout-minutes: 1

    steps:
      - name: Load build 💽
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v4
        if: ${{ !contains(fromJSON('["14.21.4"]'), needs.build.outputs.node-version) }}
        with:
          node-version: ${{ needs.build.outputs.node-version }}

      - name: Install nvm
        if: ${{ contains(fromJSON('["14.21.4"]'), needs.build.outputs.node-version) }}
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          export NVM_DIR="$([ -z "${XDG_CONFIG_HOME-}" ] && printf %s "${HOME}/.nvm" || printf %s "${XDG_CONFIG_HOME}/nvm")"
          echo "NVM_DIR=$NVM_DIR" >> "$GITHUB_ENV"

      - name: Install Meteor-specific Node version to nvm
        if: ${{ contains(fromJSON('["14.21.4"]'), needs.build.outputs.node-version) }}
        env:
          NODE_VERSION: ${{ needs.build.outputs.node-version }}
          NVM_DIR: ${{ env.NVM_DIR }}
        run: |
          export NODE_INSTALL_PATH="${NVM_DIR}/versions/node/v${NODE_VERSION}"
          curl "https://static.meteor.com/dev-bundle-node-os/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" | tar xzf - -C /tmp/
          mkdir -p "${NODE_INSTALL_PATH}"
          rm -r "${NODE_INSTALL_PATH}"
          mv "/tmp/node-v${NODE_VERSION}-linux-x64" "${NODE_INSTALL_PATH}"

      - name: Use Meteor-specific Node version via nvm
        if: ${{ contains(fromJSON('["14.21.4"]'), needs.build.outputs.node-version) }}
        env:
          NODE_VERSION: ${{ needs.build.outputs.node-version }}
          NVM_DIR: ${{ env.NVM_DIR }}
        run: |
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          nvm use "${NODE_VERSION}"
          nvm alias default "${NODE_VERSION}"
          echo \
          "NODE_PATH=$(dirname $(nvm which $(node --version)))" \
          >> "$GITHUB_ENV"

      - name: Node WIP
        env:
          NODE_PATH: ${{ env.NODE_PATH }}
        run: node --version

      - name: Dist WIP
        run: ls -la dist
